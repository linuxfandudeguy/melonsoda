/* Reset and body styling */
body {
  margin: 0;
  padding: 0;
  font-family: "thisisafont", monospace, sans-serif; /* Use custom font */
  color: #fff;
  overflow-x: hidden;
}

/* Container for content */
.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 50px;
  transition: all 0.5s ease;
}

/* Navigation bar */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.8);
  padding: 10px 0;
  display: flex;
  justify-content: center;
  gap: 20px;
  z-index: 999;
}

nav a {
  color: #0ff;
  text-decoration: none;
  font-weight: bold;
  transition: color 0.3s ease;
}

nav a:hover {
  color: #ff0;
}

/* Buttons */
button {
  font-family: "thisisafont", monospace, sans-serif; /* Use custom font */
  background: #0ff;
  color: #000;
  border: none;
  padding: 10px 20px;
  cursor: pointer;
  margin-top: 20px;
  transition: background 0.3s ease, color 0.3s ease;
}

button:hover {
  background: #ff0;
  color: #000;
}

</style>

  <style>
/* Snowflake fall animation */
@keyframes snowflakes-fall {
  0% { top: -10%; }
  100% { top: 100%; }
}
@keyframes snowflakes-shake {
  0%,100% { transform: translateX(0); }
  50% { transform: translateX(80px); }
}

/* Webkit fallback */
@-webkit-keyframes snowflakes-fall { 0% { top: -10%; } 100% { top: 100%; } }
@-webkit-keyframes snowflakes-shake { 0%,100% {-webkit-transform:translateX(0);} 50% {-webkit-transform:translateX(80px);} }

.snowflake {
  position: fixed;
  top: -10%;
  width: 60px; /* much bigger than favicon size */
  height: auto; /* keeps aspect ratio */
  z-index: 9999;
  user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  animation-name: snowflakes-fall, snowflakes-shake;
  animation-duration: 10s, 3s;
  animation-timing-function: linear, ease-in-out;
  animation-iteration-count: infinite, infinite;
  animation-play-state: running, running;
  -webkit-animation-name: snowflakes-fall, snowflakes-shake;
  -webkit-animation-duration: 10s, 3s;
  -webkit-animation-timing-function: linear, ease-in-out;
  -webkit-animation-iteration-count: infinite, infinite;
  -webkit-animation-play-state: running, running;
}

/* Snowflake positions and delays */
.snowflake:nth-of-type(1){ left:1%; animation-delay:0s,0s; -webkit-animation-delay:0s,0s; }
.snowflake:nth-of-type(2){ left:10%; animation-delay:1s,1s; -webkit-animation-delay:1s,1s; }
.snowflake:nth-of-type(3){ left:20%; animation-delay:6s,0.5s; -webkit-animation-delay:6s,0.5s; }
.snowflake:nth-of-type(4){ left:30%; animation-delay:4s,2s; -webkit-animation-delay:4s,2s; }
.snowflake:nth-of-type(5){ left:40%; animation-delay:2s,2s; -webkit-animation-delay:2s,2s; }
.snowflake:nth-of-type(6){ left:50%; animation-delay:8s,3s; -webkit-animation-delay:8s,3s; }
.snowflake:nth-of-type(7){ left:60%; animation-delay:6s,2s; -webkit-animation-delay:6s,2s; }
.snowflake:nth-of-type(8){ left:70%; animation-delay:2.5s,1s; -webkit-animation-delay:2.5s,1s; }
.snowflake:nth-of-type(9){ left:80%; animation-delay:1s,0s; -webkit-animation-delay:1s,0s; }
.snowflake:nth-of-type(10){ left:90%; animation-delay:3s,1.5s; -webkit-animation-delay:3s,1.5s; }
.snowflake:nth-of-type(11){ left:25%; animation-delay:2s,0s; -webkit-animation-delay:2s,0s; }
.snowflake:nth-of-type(12){ left:65%; animation-delay:4s,2.5s; -webkit-animation-delay:4s,2.5s; }

.snowflake img { width:20px; }

    const typingSpeed = 50;   // milliseconds per character
  const deletingSpeed = 25; // milliseconds per character
  const pauseTime = 1000;   // pause after full quote

  let index = 0;
  let typingActive = false; // ensures only one loop runs

  // Type a single string
  async function typeQuote(str, element) {
    for (let i = 0; i <= str.length; i++) {
      element.textContent = str.slice(0, i);
      await new Promise(r => setTimeout(r, typingSpeed));
    }
  }

  // Delete the string
  async function deleteQuote(element) {
    const str = element.textContent;
    for (let i = str.length; i >= 0; i--) {
      element.textContent = str.slice(0, i);
      await new Promise(r => setTimeout(r, deletingSpeed));
    }
  }

  // Main loop: cycles quotes indefinitely
  async function cycleQuotes() {
    if (typingActive) return; // prevent duplicate loops
    typingActive = true;

    while (true) {
      const element = document.getElementById('quote');
      if (!element) {
        // wait until the element exists in the DOM
        await new Promise(r => setTimeout(r, 200));
        continue;
      }

      const currentQuote = window.quotes[index];
      await typeQuote(currentQuote, element);
      await new Promise(r => setTimeout(r, pauseTime));
      await deleteQuote(element);

      index = (index + 1) % window.quotes.length;
    }
  }

  cycleQuotes(); // start the typing effect

    <scr` + `ipt>
      const ZIP_URL = "https://github.com/linuxfandudeguy/melonsoda/raw/refs/heads/main/math.zip";

      const gameListEl = document.getElementById("gameList");

      async function loadZipGames() {
        try {
          const res = await fetch(ZIP_URL);
          const blob = await res.blob();

          const zip = await JSZip.loadAsync(blob);

          gameListEl.innerHTML = "";

          const entries = [];

          zip.forEach((path, file) => {
            if (!file.dir && path.toLowerCase().endsWith(".html")) {
              entries.push({ path, file });
            }
          });

          if (entries.length === 0) {
            gameListEl.innerText = "No HTML files found.";
            return;
          }

          entries.sort((a, b) => a.path.localeCompare(b.path));

          for (const entry of entries) {
            const name = entry.path.split("/").pop().replace(/\\.html$/i, "");

            const a = document.createElement("a");
            a.href = "#";
            a.textContent = name;
            a.style.display = "block";
            a.style.margin = "6px 0";

            a.onclick = async (e) => {
              e.preventDefault();

              const html = await entry.file.async("string");

              const blob = new Blob([html], { type: "text/html" });
              const url = URL.createObjectURL(blob);

              launchGame(url);
            };

            gameListEl.appendChild(a);
          }

        } catch (err) {
          console.error(err);
          gameListEl.innerText = "Failed to load games.";
        }
      }

      let currentOverlay = null;
      let currentFrame = null;

      function launchGame(url) {
        const overlay = document.createElement('div');
        overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;";

        frame.style.cssText = "width:80%;height:80%;border:none;";

        const closeBtn = document.createElement('button');
        closeBtn.innerText = 'Close';
        closeBtn.style.cssText = "margin-top:10px;padding:5px 10px;cursor:pointer;";
        closeBtn.onclick = () => {
          if (document.fullscreenElement) document.exitFullscreen();
          document.body.removeChild(overlay);
        };

        const fsBtn = document.createElement('button');
        fsBtn.innerText = 'Fullscreen';
        fsBtn.style.cssText = "margin-top:5px;padding:5px 10px;cursor:pointer;";
        fsBtn.onclick = () => {
          if (overlay.requestFullscreen) overlay.requestFullscreen();
        };

        overlay.appendChild(frame);
        overlay.appendChild(closeBtn);
        overlay.appendChild(fsBtn);
        document.body.appendChild(overlay);

        frame.focus();
      }

      loadZipGames();
    </scr` + `ipt>

<script>
(function () {
    const root = document.getElementById("viewer-cli-container");
    const term = root.querySelector(".terminal");
    const input = root.querySelector(".cmd");
    const videos = root.querySelector(".videos");

    const base = "https://www.youtube-nocookie.com/embed/";
    const end = "?autoplay=1&rel=0&modestbranding=1";

    function log(text, type) {
        type = type || "INFO";
        const line = document.createElement("div");
        line.textContent = "[ " + type + " ] " + text;
        term.appendChild(line);
        term.scrollTop = term.scrollHeight;
    }

    function getYouTubeID(url) {
        const regExp = /(?:youtube\\.com\\/(?:watch\\?v=|embed\\/|shorts\\/)|youtu\\.be\\/)([a-zA-Z0-9_-]{11})/;
        const match = url.match(regExp);
        return match ? match[1] : null;
    }

    function loadVideo(url) {
        log("Parsing URL...");

        const id = getYouTubeID(url);
        if (!id) {
            log("Invalid URL", "ERROR");
            return;
        }

        log("Connecting...", "CONNECT");

        const iframe = document.createElement("iframe");
        iframe.src = base + id + end;
        iframe.allow = "fullscreen; autoplay; encrypted-media; picture-in-picture";
        iframe.allowFullscreen = true;

        videos.prepend(iframe);
        log("Playback started", "SUCCESS");

        try {
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
                log("Fullscreen activated!", "FULLSCREEN");
            }
        } catch (err) {
            log("Fullscreen denied: " + err.message, "ERROR");
        }
    }

    function runCommand(cmd) {
        log("> " + cmd, "CMD");

        const parts = cmd.split(" ");
        const command = parts[0];
        const arg = parts[1];

        if (command === "help") {
            log("Commands:");
            log("load <url>");
            log("clear");
        } else if (command === "load") {
            if (!arg) {
                log("Missing URL", "ERROR");
                return;
            }
            loadVideo(arg);
        } else if (command === "clear") {
            term.innerHTML = "";
        } else {
            log("Unknown command", "ERROR");
        }
    }

    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            const val = input.value.trim();
            if (val) runCommand(val);
            input.value = "";
        }
    });

    log("viewer-cli initialized", "BOOT");
})();

<script>
const appDiv = document.getElementById('app');
const navDiv = document.getElementById('nav');

// Build nav from Pages array without innerHTML
function buildNav() {
    navDiv.textContent = ''; // Clear previous content

    window.Pages.forEach(page => {
        const link = document.createElement('a');
        link.href = '#';
        link.textContent = page.title;
        link.dataset.target = page.id;

        link.addEventListener('click', e => {
            e.preventDefault();
            renderPage(page.id);
        });

        navDiv.appendChild(link);
    });
}

// Render a page by id without innerHTML
function renderPage(id) {
    const page = window.Pages.find(p => p.id === id);
    if (!page) return;

    appDiv.textContent = ''; // Clear previous content

    if (page.html instanceof HTMLElement) {
        appDiv.appendChild(page.html);
    } else if (typeof page.html === 'string') {
        const template = document.createElement('template');
        template.innerHTML = page.html.trim();

        Array.from(template.content.childNodes).forEach(node => {
            if (node.tagName === 'SCRIPT') {
                // Create a new script element to run it
                const script = document.createElement('script');
                if (node.src) {
                    script.src = node.src; // external script
                    script.async = false;  // preserve order
                } else {
                    script.textContent = node.textContent; // inline script
                }
                document.head.appendChild(script); // execute script
                document.head.removeChild(script); // optional cleanup
            } else {
                appDiv.appendChild(node);
            }
        });
    }

    // Reattach button listeners inside page content
    const buttons = appDiv.querySelectorAll('button[data-target]');
    buttons.forEach(btn => {
        btn.addEventListener('click', e => {
            renderPage(btn.dataset.target);
        });
    });
}
// Initialize SPA
buildNav();
renderPage('home');

</script>
