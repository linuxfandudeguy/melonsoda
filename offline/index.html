/* Reset and body styling */
body {
  margin: 0;
  padding: 0;
  font-family: "thisisafont", monospace, sans-serif; /* Use custom font */
  color: #fff;
  overflow-x: hidden;
}

/* Container for content */
.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 50px;
  transition: all 0.5s ease;
}

/* Navigation bar */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.8);
  padding: 10px 0;
  display: flex;
  justify-content: center;
  gap: 20px;
  z-index: 999;
}

nav a {
  color: #0ff;
  text-decoration: none;
  font-weight: bold;
  transition: color 0.3s ease;
}

nav a:hover {
  color: #ff0;
}

/* Buttons */
button {
  font-family: "thisisafont", monospace, sans-serif; /* Use custom font */
  background: #0ff;
  color: #000;
  border: none;
  padding: 10px 20px;
  cursor: pointer;
  margin-top: 20px;
  transition: background 0.3s ease, color 0.3s ease;
}

button:hover {
  background: #ff0;
  color: #000;
}

</style>
  <style>
/* Snowflake fall animation */
@keyframes snowflakes-fall {
  0% { top: -10%; }
  100% { top: 100%; }
}
@keyframes snowflakes-shake {
  0%,100% { transform: translateX(0); }
  50% { transform: translateX(80px); }
}

/* Webkit fallback */
@-webkit-keyframes snowflakes-fall { 0% { top: -10%; } 100% { top: 100%; } }
@-webkit-keyframes snowflakes-shake { 0%,100% {-webkit-transform:translateX(0);} 50% {-webkit-transform:translateX(80px);} }

.snowflake {
  position: fixed;
  top: -10%;
  width: 60px; /* much bigger than favicon size */
  height: auto; /* keeps aspect ratio */
  z-index: 9999;
  user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  animation-name: snowflakes-fall, snowflakes-shake;
  animation-duration: 10s, 3s;
  animation-timing-function: linear, ease-in-out;
  animation-iteration-count: infinite, infinite;
  animation-play-state: running, running;
  -webkit-animation-name: snowflakes-fall, snowflakes-shake;
  -webkit-animation-duration: 10s, 3s;
  -webkit-animation-timing-function: linear, ease-in-out;
  -webkit-animation-iteration-count: infinite, infinite;
  -webkit-animation-play-state: running, running;
}

/* Snowflake positions and delays */
.snowflake:nth-of-type(1){ left:1%; animation-delay:0s,0s; -webkit-animation-delay:0s,0s; }
.snowflake:nth-of-type(2){ left:10%; animation-delay:1s,1s; -webkit-animation-delay:1s,1s; }
.snowflake:nth-of-type(3){ left:20%; animation-delay:6s,0.5s; -webkit-animation-delay:6s,0.5s; }
.snowflake:nth-of-type(4){ left:30%; animation-delay:4s,2s; -webkit-animation-delay:4s,2s; }
.snowflake:nth-of-type(5){ left:40%; animation-delay:2s,2s; -webkit-animation-delay:2s,2s; }
.snowflake:nth-of-type(6){ left:50%; animation-delay:8s,3s; -webkit-animation-delay:8s,3s; }
.snowflake:nth-of-type(7){ left:60%; animation-delay:6s,2s; -webkit-animation-delay:6s,2s; }
.snowflake:nth-of-type(8){ left:70%; animation-delay:2.5s,1s; -webkit-animation-delay:2.5s,1s; }
.snowflake:nth-of-type(9){ left:80%; animation-delay:1s,0s; -webkit-animation-delay:1s,0s; }
.snowflake:nth-of-type(10){ left:90%; animation-delay:3s,1.5s; -webkit-animation-delay:3s,1.5s; }
.snowflake:nth-of-type(11){ left:25%; animation-delay:2s,0s; -webkit-animation-delay:2s,0s; }
.snowflake:nth-of-type(12){ left:65%; animation-delay:4s,2.5s; -webkit-animation-delay:4s,2.5s; }

<script>
const appDiv = document.getElementById('app');
const navDiv = document.getElementById('nav');

// Build nav from Pages array without innerHTML
function buildNav() {
    navDiv.textContent = ''; // Clear previous content

    window.Pages.forEach(page => {
        const link = document.createElement('a');
        link.href = '#';
        link.textContent = page.title;
        link.dataset.target = page.id;

        link.addEventListener('click', e => {
            e.preventDefault();
            renderPage(page.id);
        });

        navDiv.appendChild(link);
    });
}

// Render a page by id without innerHTML
function renderPage(id) {
    const page = window.Pages.find(p => p.id === id);
    if (!page) return;

    appDiv.textContent = ''; // Clear previous content

    // If the page content is a DOM node, append it
    if (page.html instanceof HTMLElement) {
        appDiv.appendChild(page.html);
    } else if (typeof page.html === 'string') {
        // If it's a string of HTML, parse it safely
        const template = document.createElement('template');
        template.innerHTML = page.html.trim();

        Array.from(template.content.childNodes).forEach(node => {
            appDiv.appendChild(node);
        });
    }

    // Attach button listeners inside page content
    const buttons = appDiv.querySelectorAll('button[data-target]');
    buttons.forEach(btn => {
        btn.addEventListener('click', e => {
            renderPage(btn.dataset.target);
        });
    });
}

// Initialize SPA
buildNav();
renderPage('home');

</script>
